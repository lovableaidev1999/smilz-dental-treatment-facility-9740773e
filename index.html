<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.png" type="image/png" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#1A365D" />
    <meta name="format-detection" content="telephone=yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <title>Smilz Dental Treatment Facility</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://eukymrxxmvkchxfpjjuz.supabase.co" crossorigin />
    <!--
      Hero image preload is injected per-page via SEOHead (only on / and SEO landing pages),
      so non-home pages don't pay for the unused preload on mobile.
      Poppins is loaded with only 2 weights (400, 600) on the critical path; extra
      weights and any user-selected display font are appended lazily by FontApplier
      after first paint to keep LCP/FCP fast.
    -->
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" onload="this.onload=null;this.rel='stylesheet'" />
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" /></noscript>
    <!-- Ahrefs analytics: defer until after page load so it never blocks LCP/TBT -->
    <script>
      window.addEventListener('load', function() {
        var s = document.createElement('script');
        s.src = 'https://analytics.ahrefs.com/analytics.js';
        s.setAttribute('data-key', 'VHgy6LHj/y0/d6Ullyzd/g');
        s.async = true;
        s.defer = true;
        document.head.appendChild(s);
      });
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
