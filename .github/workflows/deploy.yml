name: Build & Deploy to Hostinger

on:
  push:
    branches: [main]

# Cancel any in-flight run for the same branch when a new commit lands.
# Prevents two slow FTP deploys racing each other and hanging.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 180  # increased: 90min prerender + 45min FTP + ~15min build/install headroom
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'  # cache node_modules between runs

      - name: Cache Puppeteer Chromium
        uses: actions/cache@v4
        with:
          path: ~/.cache/puppeteer
          key: puppeteer-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - run: npm install --legacy-peer-deps

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy Supabase Edge Functions
        run: supabase functions deploy sync-google-reviews --project-ref eukymrxxmvkchxfpjjuz
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Generate sitemap.xml
        run: node scripts/generate-sitemap.mjs
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      # Static validation — fails the build if any dirty slugs
      # (in-near-, near-, percent-encoded) made it into sitemap.xml.
      - name: Validate sitemap (static)
        run: node scripts/validate-sitemap.mjs dist/sitemap.xml

      - name: Prerender public pages
        timeout-minutes: 90
        run: node scripts/prerender.mjs
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      # Final safety net before FTP upload: every sitemap route must have a
      # physical index.html in dist/. Hostinger/Apache returns 403 for an
      # existing directory without an index.html (Options -Indexes), so if a
      # prerender miss leaves dist/services/ without dist/services/index.html,
      # the live sitemap validator fails before the SPA fallback can run.
      - name: Ensure sitemap route index files exist
        run: |
          node <<'NODE'
          const fs = require('fs');
          const path = require('path');
          const crypto = require('crypto');

          const dist = path.resolve('dist');
          const sitemapPath = path.join(dist, 'sitemap.xml');
          const shellPath = path.join(dist, 'index.html');

          if (!fs.existsSync(sitemapPath)) {
            throw new Error(`Missing sitemap: ${sitemapPath}`);
          }
          if (!fs.existsSync(shellPath)) {
            throw new Error(`Missing SPA shell: ${shellPath}`);
          }

          const xml = fs.readFileSync(sitemapPath, 'utf8');
          const locs = [...xml.matchAll(/<loc>([^<]+)<\/loc>/g)].map((m) => m[1].trim());
          const backfilled = [];

          for (const loc of locs) {
            const url = new URL(loc);
            if (url.hostname !== 'smilz.net') continue;
            const routePath = decodeURIComponent(url.pathname);
            const indexPath = routePath === '/'
              ? shellPath
              : path.join(dist, routePath, 'index.html');

            if (fs.existsSync(indexPath)) continue;

            fs.mkdirSync(path.dirname(indexPath), { recursive: true });
            fs.copyFileSync(shellPath, indexPath);
            const now = new Date();
            fs.utimesSync(indexPath, now, now);
            backfilled.push(routePath);
          }

          if (backfilled.length) {
            console.warn(`[route-index-guard] Backfilled ${backfilled.length} route index file(s):`);
            for (const route of backfilled) console.warn(`  - ${route}`);
          } else {
            console.log('[route-index-guard] All sitemap routes already have index.html files');
          }

          const servicesIndex = path.join(dist, 'services', 'index.html');
          if (!fs.existsSync(servicesIndex)) {
            throw new Error('dist/services/index.html is still missing after route index guard');
          }
          console.log(`[route-index-guard] Confirmed ${path.relative(process.cwd(), servicesIndex)} exists`);
          const servicesStat = fs.statSync(servicesIndex);
          const servicesHash = crypto
            .createHash('sha256')
            .update(fs.readFileSync(servicesIndex))
            .digest('hex');
          console.log('[route-index-guard] PROOF dist/services/index.html exists');
          console.log(`[route-index-guard] size=${servicesStat.size}`);
          console.log(`[route-index-guard] mtime=${servicesStat.mtime.toISOString()}`);
          console.log(`[route-index-guard] sha256=${servicesHash}`);

          const homeIndex = path.join(dist, 'index.html');
          if (!fs.existsSync(homeIndex)) {
            throw new Error('dist/index.html is missing after build/prerender');
          }
          const homeStat = fs.statSync(homeIndex);
          const homeHash = crypto
            .createHash('sha256')
            .update(fs.readFileSync(homeIndex))
            .digest('hex');
          console.log('[route-index-guard] PROOF dist/index.html exists');
          console.log(`[route-index-guard] home_size=${homeStat.size}`);
          console.log(`[route-index-guard] home_mtime=${homeStat.mtime.toISOString()}`);
          console.log(`[route-index-guard] home_sha256=${homeHash}`);
          NODE

      # Write a per-run deploy marker so the verify step below can confirm
      # the new build actually reached the server — independent of whether
      # the FTP action's delete phase encountered a stale folder (550 RMD).
      #
      # Hostinger may route unknown root-level .txt requests through the SPA
      # fallback while Apache/.htaccess changes propagate, so verification uses
      # a real JS file under /assets/. Existing static asset files are served
      # directly even when the SPA fallback would rewrite missing paths.
      - name: Write deploy marker
        run: |
          mkdir -p dist
          mkdir -p dist/assets
          echo "sha=${{ github.sha }}" > dist/deploy-marker.txt
          echo "run_id=${{ github.run_id }}" >> dist/deploy-marker.txt
          echo "deployed_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> dist/deploy-marker.txt
          echo "workflow=deploy" >> dist/deploy-marker.txt
          cat > "dist/assets/deploy-marker-${{ github.sha }}.js" <<'EOF'
          window.__SMILZ_DEPLOY_MARKER__ = {
            sha: "${{ github.sha }}",
            runId: "${{ github.run_id }}",
            workflow: "deploy"
          };
          EOF
          echo "--- dist root contents ---"
          ls -la dist/ | head -50
          echo "--- marker asset ---"
          ls -la "dist/assets/deploy-marker-${{ github.sha }}.js"
          echo "--- marker preview ---"
          cat dist/deploy-marker.txt
          echo "--- .htaccess present? ---"
          ls -la dist/.htaccess || echo "MISSING .htaccess"

      # Upload with lftp instead of FTP-Deploy-Action. The action keeps a remote
      # sync-state file and can fail on stale delete entries such as the old
      # /***best-dentist-in-garia-park folder. lftp uploads changed files only
      # and never processes that corrupted delete queue.
      - name: Install lftp
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp

      - name: Deploy via FTP (lftp incremental upload)
        id: ftp_deploy
        continue-on-error: true
        timeout-minutes: 45  # increased from 12: first-run uploads all files, subsequent runs are fast
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_PORT: ${{ secrets.FTP_PORT }}
          FTP_PATH: ${{ secrets.FTP_PATH }}
          DEPLOY_MARKER: deploy-marker-${{ github.sha }}.js
          SERVICES_INDEX: services/index.html
          HOME_INDEX: index.html
        run: |
          set -uo pipefail
          : "${FTP_SERVER:?FTP_SERVER is required}"
          : "${FTP_USERNAME:?FTP_USERNAME is required}"
          : "${FTP_PASSWORD:?FTP_PASSWORD is required}"
          : "${FTP_PORT:?FTP_PORT is required}"
          : "${FTP_PATH:?FTP_PATH is required}"

          lftp -u "$FTP_USERNAME","$FTP_PASSWORD" -p "$FTP_PORT" "$FTP_SERVER" <<LFTP | tee /tmp/lftp_output.log
          set cmd:fail-exit true
          set ftp:ssl-allow true
          set ftp:ssl-force false
          set ssl:verify-certificate no
          set net:max-retries 5
          set net:timeout 45
          set net:reconnect-interval-base 5
          set cmd:fail-exit false
          mkdir -p "$FTP_PATH"
          set cmd:fail-exit true
          cd "$FTP_PATH"
          mirror -R --verbose=1 --parallel=4 \
            --exclude-glob ".git*" \
            --exclude-glob ".git*/**" \
            --exclude-glob "node_modules/**" \
            --exclude-glob ".DS_Store" \
            --exclude-glob "prerender-report.json" \
            --exclude-glob "*.map" \
            --exclude-glob "deploy-marker-*.js" \
            ./dist/ ./
          set cmd:fail-exit false
          mkdir -p services
          set cmd:fail-exit true
          put -O services "dist/$SERVICES_INDEX"
          cls -l "$SERVICES_INDEX"
          echo "__SERVICES_INDEX_CONFIRMED__ $SERVICES_INDEX"
          set cmd:fail-exit false
          mkdir -p assets
          set cmd:fail-exit true
          put -O assets "dist/assets/$DEPLOY_MARKER"
          cls -l "assets/$DEPLOY_MARKER"
          echo "__DEPLOY_MARKER_CONFIRMED__ assets/$DEPLOY_MARKER"
          bye
          LFTP
          LFTP_EXIT=$?

          # Determine, from lftp's own output, whether the marker file
          # actually landed on the server — independent of the overall
          # lftp exit code, which can be non-zero due to unrelated benign
          # warnings (e.g. the "550 File exists" on mkdir).
          if grep -q "__DEPLOY_MARKER_CONFIRMED__ assets/$DEPLOY_MARKER" /tmp/lftp_output.log; then
            echo "marker_uploaded=true" >> "$GITHUB_OUTPUT"
            echo "✅ Confirmed via FTP listing: $DEPLOY_MARKER is present on the server"
          else
            echo "marker_uploaded=false" >> "$GITHUB_OUTPUT"
            echo "⚠️ Could not confirm $DEPLOY_MARKER in FTP output"
          fi

          if grep -q "__SERVICES_INDEX_CONFIRMED__ $SERVICES_INDEX" /tmp/lftp_output.log; then
            echo "services_index_uploaded=true" >> "$GITHUB_OUTPUT"
            echo "✅ Confirmed via FTP listing: $SERVICES_INDEX is present on the server"
          else
            echo "services_index_uploaded=false" >> "$GITHUB_OUTPUT"
            echo "⚠️ Could not confirm $SERVICES_INDEX in FTP output"
          fi

          exit $LFTP_EXIT

      # Target the one route that has been failing before running the full
      # sitemap validator. If FTP directly confirmed services/index.html,
      # allow extra Hostinger/LiteSpeed propagation time instead of failing
      # immediately on a stale 403.
      - name: Verify /services/ route
        run: |
          SERVICES_URL="https://smilz.net/services/"
          SERVICES_INDEX_UPLOADED="${{ steps.ftp_deploy.outputs.services_index_uploaded }}"
          echo "Services URL: $SERVICES_URL"
          echo "FTP-confirmed services/index.html upload: $SERVICES_INDEX_UPLOADED"

          for i in $(seq 1 24); do
            STATUS=$(curl -L -o /tmp/services-route-body.html -w "%{http_code}" \
              -H "Cache-Control: no-cache" \
              -H "Pragma: no-cache" \
              "$SERVICES_URL?cb=$(date +%s%N)" || echo "000")
            echo "Attempt $i — /services/ HTTP status: $STATUS"
            if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 400 ]; then
              echo "✅ /services/ is live with status $STATUS"
              exit 0
            fi
            if [ "$STATUS" = "403" ] && [ "$SERVICES_INDEX_UPLOADED" = "true" ]; then
              echo "   FTP confirmed services/index.html; waiting for Hostinger cache/propagation"
            fi
            sleep 15
          done

          echo "Last /services/ response preview:"
          head -20 /tmp/services-route-body.html || true
          echo "❌ /services/ did not return 2xx/3xx before full sitemap validation"
          exit 1

      # Verify the new build is actually live by fetching the deploy marker
      # asset we just wrote into dist/assets/. Hostinger's edge/LiteSpeed
      # cache can briefly serve a stale 404 for a filename that didn't exist
      # a moment ago, even though the FTP upload itself already succeeded
      # (see ftp_deploy's own "marker_uploaded" check above). So: retry with
      # cache-busting for a while, and if the FTP step already proved the
      # file was uploaded, treat continued 404s as a propagation warning
      # instead of a hard failure. If the FTP step could NOT confirm the
      # upload, this stays a hard failure.
      - name: Verify Deploy
        run: |
          set -e
          EXPECTED_SHA="${{ github.sha }}"
          MARKER_URL="https://smilz.net/assets/deploy-marker-${EXPECTED_SHA}.js"
          MARKER_UPLOADED="${{ steps.ftp_deploy.outputs.marker_uploaded }}"
          echo "Expected SHA: $EXPECTED_SHA"
          echo "Marker URL: $MARKER_URL"
          echo "FTP-confirmed upload: $MARKER_UPLOADED"
          sleep 15
          # Retry up to 24 times over ~6 minutes for FTP/CDN propagation.
          for i in $(seq 1 24); do
            DEPLOYED=$(curl -fsSL \
              -H "Cache-Control: no-cache" \
              -H "Pragma: no-cache" \
              "$MARKER_URL?cb=$(date +%s%N)" || echo "MISSING")
            FIRST_LINE=$(echo "$DEPLOYED" | head -1)
            echo "Attempt $i — first line: $FIRST_LINE"
            if echo "$DEPLOYED" | grep -q "$EXPECTED_SHA"; then
              echo "✅ Deploy verified — live site is at SHA $EXPECTED_SHA"
              exit 0
            fi
            if echo "$FIRST_LINE" | grep -qi "<!doctype\|<html"; then
              echo "   (server returned SPA fallback for marker asset; waiting)"
            elif [ "$DEPLOYED" = "MISSING" ]; then
              echo "   (marker asset not available yet; waiting)"
            fi
            sleep 15
          done

          echo "   FTP step outcome: ${{ steps.ftp_deploy.outcome }}"
          echo "   Last response (first 20 lines):"
          echo "$DEPLOYED" | head -20

          if [ "$MARKER_UPLOADED" = "true" ]; then
            echo "⚠️  WARNING: HTTP verification could not confirm the marker within the retry"
            echo "    window, but the FTP step directly confirmed the file was uploaded to the"
            echo "    server. This is most likely Hostinger edge/cache propagation lag, not a"
            echo "    failed deploy. Treating as a non-fatal warning."
            exit 0
          fi

          echo "❌ Deploy verification failed — live marker asset does not contain $EXPECTED_SHA"
          echo "    and the FTP step could not confirm the file was uploaded either."
          exit 1

      # Live HTTP validation — every sitemap URL must return 2xx/3xx on
      # smilz.net. Runs only after the deploy marker confirms the new build
      # is live, so it validates the just-shipped URLs, not the previous one.
      - name: Validate sitemap (live HTTP)
        run: node scripts/validate-sitemap.mjs dist/sitemap.xml --live
