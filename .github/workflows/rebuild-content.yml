name: Rebuild Prerendered Pages

# Trigger manually from GitHub Actions UI OR via webhook
on:
  workflow_dispatch:
  repository_dispatch:
    types: [content-updated]

concurrency:
  group: rebuild-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rebuild:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Cache Puppeteer Chromium
        uses: actions/cache@v4
        with:
          path: ~/.cache/puppeteer
          key: puppeteer-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - run: npm install --legacy-peer-deps

      - run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Generate sitemap.xml
        run: node scripts/generate-sitemap.mjs
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Prerender public pages
        timeout-minutes: 90
        run: node scripts/prerender.mjs
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Install lftp
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp

      - name: Deploy via FTP (lftp incremental upload)
        timeout-minutes: 45
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_PORT: ${{ secrets.FTP_PORT }}
          FTP_PATH: ${{ secrets.FTP_PATH }}
        run: |
          set -euo pipefail
          : "${FTP_SERVER:?FTP_SERVER is required}"
          : "${FTP_USERNAME:?FTP_USERNAME is required}"
          : "${FTP_PASSWORD:?FTP_PASSWORD is required}"
          : "${FTP_PORT:?FTP_PORT is required}"
          : "${FTP_PATH:?FTP_PATH is required}"

          lftp -u "$FTP_USERNAME","$FTP_PASSWORD" -p "$FTP_PORT" "$FTP_SERVER" <<LFTP
          set ftp:ssl-allow true
          set ftp:ssl-force false
          set ssl:verify-certificate no
          set net:max-retries 5
          set net:timeout 45
          set net:reconnect-interval-base 5
          mkdir -p "$FTP_PATH"
          mirror -R --verbose=1 --parallel=4 --only-newer \
            --exclude-glob ".git*" \
            --exclude-glob ".git*/**" \
            --exclude-glob "node_modules/**" \
            --exclude-glob ".DS_Store" \
            --exclude-glob "prerender-report.json" \
            --exclude-glob "*.map" \
            ./dist/ "$FTP_PATH"
          bye
          LFTP
